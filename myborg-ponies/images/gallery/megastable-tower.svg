<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0010"/>
      <stop offset="100%" stop-color="#1A0033"/>
    </linearGradient>
    <linearGradient id="tower-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A0050"/>
      <stop offset="100%" stop-color="#120020"/>
    </linearGradient>
    <linearGradient id="pink-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF1493" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF1493" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="640" height="400" fill="url(#bg)"/>
  <!-- City glow at base -->
  <ellipse cx="320" cy="350" rx="350" ry="80" fill="#FF1493" opacity="0.04"/>
  <!-- Ground -->
  <rect x="0" y="330" width="640" height="70" fill="#0A0010"/>
  <line x1="0" y1="330" x2="640" y2="330" stroke="#BF00FF" stroke-width="0.5" opacity="0.3"/>
  <!-- Background smaller buildings -->
  <rect x="50" y="260" width="60" height="70" fill="#150025" stroke="#BF00FF" stroke-width="0.3" opacity="0.5"/>
  <rect x="130" y="240" width="50" height="90" fill="#120020" stroke="#BF00FF" stroke-width="0.3" opacity="0.5"/>
  <rect x="460" y="250" width="55" height="80" fill="#150025" stroke="#BF00FF" stroke-width="0.3" opacity="0.5"/>
  <rect x="530" y="270" width="65" height="60" fill="#120020" stroke="#BF00FF" stroke-width="0.3" opacity="0.5"/>
  <!-- Main corporate tower -->
  <rect x="240" y="40" width="160" height="290" fill="url(#tower-body)" stroke="#BF00FF" stroke-width="1.5"/>
  <!-- Tower crown/top -->
  <polygon points="240,40 320,10 400,40" fill="#1A0035" stroke="#FF1493" stroke-width="1"/>
  <!-- Antenna on top -->
  <line x1="320" y1="10" x2="320" y2="-15" stroke="#FF1493" stroke-width="1.5"/>
  <circle cx="320" cy="-18" r="3" fill="#FF1493" opacity="0.9"/>
  <circle cx="320" cy="-18" r="8" fill="#FF1493" opacity="0.15"/>
  <!-- Tower vertical accent lines -->
  <line x1="270" y1="40" x2="270" y2="330" stroke="#BF00FF" stroke-width="0.5" opacity="0.3"/>
  <line x1="320" y1="40" x2="320" y2="330" stroke="#BF00FF" stroke-width="0.5" opacity="0.2"/>
  <line x1="370" y1="40" x2="370" y2="330" stroke="#BF00FF" stroke-width="0.5" opacity="0.3"/>
  <!-- Pink glowing windows - rows -->
  <!-- Row 1 -->
  <rect x="252" y="55" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="272" y="55" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="292" y="55" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="312" y="55" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="332" y="55" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="352" y="55" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="375" y="55" width="12" height="10" fill="url(#pink-glow)"/>
  <!-- Row 2 -->
  <rect x="252" y="75" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="272" y="75" width="12" height="10" fill="#0A0010" stroke="#FF1493" stroke-width="0.3" opacity="0.3"/>
  <rect x="292" y="75" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="312" y="75" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="332" y="75" width="12" height="10" fill="#0A0010" stroke="#FF1493" stroke-width="0.3" opacity="0.3"/>
  <rect x="352" y="75" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="375" y="75" width="12" height="10" fill="url(#pink-glow)"/>
