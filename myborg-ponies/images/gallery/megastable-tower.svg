  <rect x="272" y="95" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="292" y="95" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="312" y="95" width="12" height="10" fill="#0A0010" stroke="#FF1493" stroke-width="0.3" opacity="0.3"/>
  <rect x="332" y="95" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="352" y="95" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="375" y="95" width="12" height="10" fill="#0A0010" stroke="#FF1493" stroke-width="0.3" opacity="0.3"/>
  <!-- Row 4 -->
  <rect x="252" y="115" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="272" y="115" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="292" y="115" width="12" height="10" fill="#0A0010" stroke="#FF1493" stroke-width="0.3" opacity="0.3"/>
  <rect x="312" y="115" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="332" y="115" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="352" y="115" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="375" y="115" width="12" height="10" fill="url(#pink-glow)"/>
  <!-- Row 5-8 (continued pattern) -->
  <rect x="252" y="135" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="272" y="135" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="292" y="135" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="312" y="135" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="332" y="135" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="352" y="135" width="12" height="10" fill="#0A0010" stroke="#FF1493" stroke-width="0.3" opacity="0.3"/>
  <rect x="375" y="135" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="252" y="155" width="12" height="10" fill="#0A0010" stroke="#FF1493" stroke-width="0.3" opacity="0.3"/>
  <rect x="272" y="155" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="292" y="155" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="312" y="155" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="332" y="155" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="352" y="155" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="375" y="155" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="252" y="175" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="272" y="175" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="292" y="175" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="312" y="175" width="12" height="10" fill="#0A0010" stroke="#FF1493" stroke-width="0.3" opacity="0.3"/>
  <rect x="332" y="175" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="352" y="175" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="375" y="175" width="12" height="10" fill="url(#pink-glow)"/>
  <!-- More rows continuing down -->
  <rect x="252" y="195" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="272" y="195" width="12" height="10" fill="#0A0010" stroke="#FF1493" stroke-width="0.3" opacity="0.3"/>
  <rect x="292" y="195" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="312" y="195" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="332" y="195" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="352" y="195" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="375" y="195" width="12" height="10" fill="#0A0010" stroke="#FF1493" stroke-width="0.3" opacity="0.3"/>
  <rect x="252" y="215" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="272" y="215" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="292" y="215" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="312" y="215" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="332" y="215" width="12" height="10" fill="#0A0010" stroke="#FF1493" stroke-width="0.3" opacity="0.3"/>
  <rect x="352" y="215" width="12" height="10" fill="url(#pink-glow)"/>
  <rect x="375" y="215" width="12" height="10" fill="url(#pink-glow)"/>
  <!-- Tower glow effect -->
  <rect x="235" y="40" width="170" height="290" fill="#FF1493" opacity="0.03"/>
  <!-- Corporate logo area on tower face -->
  <rect x="280" y="250" width="80" height="30" fill="#0A0010" stroke="#FFD700" stroke-width="1"/>
  <text x="320" y="270" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#FFD700">MEGASTABLE</text>
  <!-- Background building windows (small) -->
  <rect x="60" y="272" width="6" height="5" fill="#FF1493" opacity="0.3"/>
  <rect x="75" y="272" width="6" height="5" fill="#FF1493" opacity="0.2"/>
  <rect x="90" y="272" width="6" height="5" fill="#00FFFF" opacity="0.3"/>
  <rect x="470" y="262" width="6" height="5" fill="#FF1493" opacity="0.3"/>
  <rect x="485" y="262" width="6" height="5" fill="#FF1493" opacity="0.2"/>
  <rect x="500" y="262" width="6" height="5" fill="#00FFFF" opacity="0.3"/>
  <rect x="540" y="282" width="6" height="5" fill="#FF1493" opacity="0.3"/>
  <rect x="555" y="282" width="6" height="5" fill="#FF1493" opacity="0.2"/>
  <rect x="570" y="282" width="6" height="5" fill="#BF00FF" opacity="0.3"/>
  <!-- Title text -->
  <text x="320" y="375" text-anchor="middle" font-family="'Courier New', monospace" font-size="26" font-weight="bold" fill="#FF1493" letter-spacing="3">MEGASTABLE TOWER</text>
  <text x="320" y="375" text-anchor="middle" font-family="'Courier New', monospace" font-size="26" font-weight="bold" fill="#FF1493" letter-spacing="3" opacity="0.3" filter="blur(4px)">MEGASTABLE TOWER</text>
