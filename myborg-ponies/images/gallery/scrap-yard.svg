<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A0033"/>
      <stop offset="100%" stop-color="#0A0010"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A1530"/>
      <stop offset="100%" stop-color="#1A0820"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="640" height="400" fill="url(#bg)"/>
  <!-- Dim sky -->
  <circle cx="550" cy="80" r="25" fill="#BF00FF" opacity="0.06"/>
  <!-- Stars -->
  <circle cx="60" cy="40" r="1" fill="#FF1493" opacity="0.4"/>
  <circle cx="180" cy="30" r="1" fill="#00FFFF" opacity="0.3"/>
  <circle cx="350" cy="45" r="1.5" fill="#BF00FF" opacity="0.3"/>
  <circle cx="480" cy="25" r="1" fill="#FFD700" opacity="0.3"/>
  <!-- Ground -->
  <path d="M 0 280 Q 100 275 200 282 Q 300 288 400 278 Q 500 272 640 285" fill="#150020"/>
  <rect x="0" y="285" width="640" height="115" fill="#150020"/>
  <path d="M 0 280 Q 100 275 200 282 Q 300 288 400 278 Q 500 272 640 285" fill="none" stroke="#BF00FF" stroke-width="0.5" opacity="0.3"/>
  <!-- Large junk pile - left -->
  <rect x="60" y="220" width="80" height="60" fill="url(#rust)" stroke="#BF00FF" stroke-width="0.5" transform="rotate(-5 100 250)"/>
  <rect x="80" y="200" width="50" height="30" fill="#1A0825" stroke="#FF1493" stroke-width="0.5" transform="rotate(8 105 215)"/>
  <rect x="40" y="240" width="40" height="25" fill="#2A1035" stroke="#BF00FF" stroke-width="0.3" transform="rotate(-10 60 252)"/>
  <!-- Gear/wheel -->
  <circle cx="110" cy="235" r="15" fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.5"/>
  <circle cx="110" cy="235" r="5" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
  <line x1="110" y1="220" x2="110" y2="250" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
  <line x1="95" y1="235" x2="125" y2="235" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
  <!-- Scattered parts - center area -->
  <rect x="220" y="260" width="35" height="15" fill="url(#rust)" stroke="#BF00FF" stroke-width="0.3" transform="rotate(12 237 267)"/>
  <rect x="260" y="250" width="25" height="20" fill="#1A0825" stroke="#FF1493" stroke-width="0.3" transform="rotate(-7 272 260)"/>
  <circle cx="300" cy="270" r="10" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.4"/>
  <circle cx="300" cy="270" r="4" fill="#00FFFF" opacity="0.1"/>
  <!-- Spring/coil -->
  <path d="M 340 275 Q 345 265 350 275 Q 355 285 360 275 Q 365 265 370 275" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
  <!-- Large pile - right -->
  <rect x="420" y="210" width="100" height="70" fill="url(#rust)" stroke="#BF00FF" stroke-width="0.5" transform="rotate(3 470 245)"/>
  <rect x="440" y="190" width="60" height="30" fill="#1A0825" stroke="#FF1493" stroke-width="0.5" transform="rotate(-5 470 205)"/>
  <polygon points="430,210 470,170 510,210" fill="#2A1035" stroke="#BF00FF" stroke-width="0.5" opacity="0.6"/>
  <rect x="500" y="230" width="45" height="35" fill="#2A1035" stroke="#BF00FF" stroke-width="0.3" transform="rotate(7 522 247)"/>
  <!-- Pipes sticking out -->
  <line x1="160" y1="230" x2="190" y2="210" stroke="#888" stroke-width="4" opacity="0.5"/>
  <line x1="470" y1="185" x2="490" y2="165" stroke="#888" stroke-width="3" opacity="0.5"/>
  <line x1="380" y1="265" x2="400" y2="245" stroke="#888" stroke-width="3" opacity="0.4"/>
  <!-- Small scattered items -->
  <rect x="180" y="275" width="8" height="5" fill="#BF00FF" opacity="0.2" transform="rotate(20 184 277)"/>
  <rect x="560" y="270" width="12" height="6" fill="#FF1493" opacity="0.15" transform="rotate(-15 566 273)"/>
  <circle cx="590" cy="265" r="4" fill="none" stroke="#00FFFF" stroke-width="0.5" opacity="0.3"/>
  <rect x="330" y="280" width="10" height="4" fill="#BF00FF" opacity="0.15"/>
  <!-- Fence/barrier in background -->
  <line x1="0" y1="195" x2="640" y2="195" stroke="#2A1040" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="180" x2="30" y2="280" stroke="#2A1040" stroke-width="1.5" opacity="0.25"/>
  <line x1="80" y1="180" x2="80" y2="280" stroke="#2A1040" stroke-width="1.5" opacity="0.25"/>
  <line x1="560" y1="180" x2="560" y2="280" stroke="#2A1040" stroke-width="1.5" opacity="0.25"/>
  <line x1="610" y1="180" x2="610" y2="280" stroke="#2A1040" stroke-width="1.5" opacity="0.25"/>
  <!-- Crane silhouette in background -->
  <line x1="320" y1="100" x2="320" y2="195" stroke="#1A0030" stroke-width="4" opacity="0.5"/>
  <line x1="320" y1="100" x2="420" y2="100" stroke="#1A0030" stroke-width="3" opacity="0.5"/>
  <line x1="420" y1="100" x2="420" y2="130" stroke="#1A0030" stroke-width="1" opacity="0.4"/>
  <line x1="320" y1="100" x2="290" y2="100" stroke="#1A0030" stroke-width="3" opacity="0.5"/>
  <!-- Crane cable -->
  <line x1="400" y1="100" x2="400" y2="170" stroke="#888" stroke-width="0.5" opacity="0.3"/>
  <rect x="395" y="170" width="10" height="8" fill="#1A0030" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
  <!-- Title text -->
  <text x="320" y="370" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#FFD700" letter-spacing="4">SCRAP YARD</text>
  <text x="320" y="370" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#FFD700" letter-spacing="4" opacity="0.3" filter="blur(4px)">SCRAP YARD</text>
</svg>