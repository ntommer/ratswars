<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A0033"/>
      <stop offset="100%" stop-color="#0A0010"/>
    </linearGradient>
    <linearGradient id="rainbow-tread" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF1493"/>
      <stop offset="25%" stop-color="#BF00FF"/>
      <stop offset="50%" stop-color="#00FFFF"/>
      <stop offset="75%" stop-color="#39FF14"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <linearGradient id="body-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A0055"/>
      <stop offset="100%" stop-color="#150028"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="640" height="400" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="50" cy="40" r="1.5" fill="#00FFFF" opacity="0.6"/>
  <circle cx="150" cy="25" r="1" fill="#FF1493" opacity="0.5"/>
  <circle cx="280" cy="50" r="1.5" fill="#FFD700" opacity="0.4"/>
  <circle cx="400" cy="30" r="1" fill="#39FF14" opacity="0.6"/>
  <circle cx="520" cy="45" r="1.5" fill="#BF00FF" opacity="0.5"/>
  <circle cx="590" cy="20" r="1" fill="#00FFFF" opacity="0.4"/>
  <circle cx="100" cy="70" r="1" fill="#FFD700" opacity="0.3"/>
  <circle cx="450" cy="65" r="1" fill="#FF1493" opacity="0.5"/>
  <!-- Ground line -->
  <rect x="0" y="310" width="640" height="90" fill="#0A0010" opacity="0.8"/>
  <line x1="0" y1="310" x2="640" y2="310" stroke="#BF00FF" stroke-width="1" opacity="0.4"/>
  <!-- Vehicle body - large mobile base -->
  <rect x="120" y="180" width="400" height="120" rx="8" fill="url(#body-glow)" stroke="#BF00FF" stroke-width="2"/>
  <!-- Vehicle top section -->
  <rect x="160" y="140" width="320" height="40" rx="5" fill="#1A0033" stroke="#FF1493" stroke-width="1.5"/>
  <!-- Windows -->
  <rect x="180" y="150" width="40" height="20" rx="2" fill="#0A0010" stroke="#00FFFF" stroke-width="1" opacity="0.8"/>
  <rect x="230" y="150" width="40" height="20" rx="2" fill="#0A0010" stroke="#00FFFF" stroke-width="1" opacity="0.8"/>
  <rect x="280" y="150" width="40" height="20" rx="2" fill="#0A0010" stroke="#FF1493" stroke-width="1" opacity="0.8"/>
  <rect x="330" y="150" width="40" height="20" rx="2" fill="#0A0010" stroke="#00FFFF" stroke-width="1" opacity="0.8"/>
  <rect x="380" y="150" width="40" height="20" rx="2" fill="#0A0010" stroke="#00FFFF" stroke-width="1" opacity="0.8"/>
  <rect x="430" y="150" width="40" height="20" rx="2" fill="#0A0010" stroke="#FF1493" stroke-width="1" opacity="0.8"/>
  <!-- Side panel lights -->
  <rect x="140" y="200" width="8" height="80" rx="2" fill="#FF1493" opacity="0.7"/>
  <rect x="492" y="200" width="8" height="80" rx="2" fill="#FF1493" opacity="0.7"/>
  <!-- Side details -->
  <line x1="160" y1="220" x2="480" y2="220" stroke="#BF00FF" stroke-width="0.5" opacity="0.4"/>
  <line x1="160" y1="260" x2="480" y2="260" stroke="#BF00FF" stroke-width="0.5" opacity="0.4"/>
  <!-- Rainbow treads -->
  <rect x="130" y="300" width="160" height="20" rx="10" fill="url(#rainbow-tread)" opacity="0.9"/>
  <rect x="350" y="300" width="160" height="20" rx="10" fill="url(#rainbow-tread)" opacity="0.9"/>
  <!-- Tread details -->
  <line x1="150" y1="305" x2="150" y2="315" stroke="#0A0010" stroke-width="2" opacity="0.5"/>
  <line x1="170" y1="305" x2="170" y2="315" stroke="#0A0010" stroke-width="2" opacity="0.5"/>
  <line x1="190" y1="305" x2="190" y2="315" stroke="#0A0010" stroke-width="2" opacity="0.5"/>
  <line x1="210" y1="305" x2="210" y2="315" stroke="#0A0010" stroke-width="2" opacity="0.5"/>
  <line x1="230" y1="305" x2="230" y2="315" stroke="#0A0010" stroke-width="2" opacity="0.5"/>
  <line x1="250" y1="305" x2="250" y2="315" stroke="#0A0010" stroke-width="2" opacity="0.5"/>
  <line x1="270" y1="305" x2="270" y2="315" stroke="#0A0010" stroke-width="2" opacity="0.5"/>
  <line x1="370" y1="305" x2="370" y2="315" stroke="#0A0010" stroke-width="2" opacity="0.5"/>
  <line x1="390" y1="305" x2="390" y2="315" stroke="#0A0010" stroke-width="2" opacity="0.5"/>
  <line x1="410" y1="305" x2="410" y2="315" stroke="#0A0010" stroke-width="2" opacity="0.5"/>
  <line x1="430" y1="305" x2="430" y2="315" stroke="#0A0010" stroke-width="2" opacity="0.5"/>
  <line x1="450" y1="305" x2="450" y2="315" stroke="#0A0010" stroke-width="2" opacity="0.5"/>
  <line x1="470" y1="305" x2="470" y2="315" stroke="#0A0010" stroke-width="2" opacity="0.5"/>
  <line x1="490" y1="305" x2="490" y2="315" stroke="#0A0010" stroke-width="2" opacity="0.5"/>
  <!-- Satellite dish -->
  <line x1="200" y1="140" x2="200" y2="90" stroke="#888" stroke-width="2"/>
  <ellipse cx="200" cy="80" rx="30" ry="15" fill="none" stroke="#00FFFF" stroke-width="1.5"/>
  <ellipse cx="200" cy="82" rx="20" ry="10" fill="#0A0010" stroke="#00FFFF" stroke-width="0.5" opacity="0.5"/>
  <circle cx="200" cy="85" r="3" fill="#00FFFF" opacity="0.8"/>
  <!-- Signal waves from dish -->
  <path d="M 215 70 Q 230 60 225 50" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.4"/>
  <path d="M 220 73 Q 240 60 233 45" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.3"/>
  <!-- Broadcasting tower -->
  <line x1="440" y1="140" x2="440" y2="60" stroke="#888" stroke-width="2"/>
  <line x1="435" y1="140" x2="440" y2="90" stroke="#888" stroke-width="1"/>
  <line x1="445" y1="140" x2="440" y2="90" stroke="#888" stroke-width="1"/>
  <!-- Tower cross-beams -->
  <line x1="436" y1="110" x2="444" y2="110" stroke="#888" stroke-width="1"/>
  <line x1="437" y1="125" x2="443" y2="125" stroke="#888" stroke-width="1"/>
  <!-- Tower light -->
  <circle cx="440" cy="58" r="4" fill="#FF1493" opacity="0.9"/>
  <circle cx="440" cy="58" r="8" fill="#FF1493" opacity="0.2"/>
  <!-- Broadcast waves -->
  <path d="M 448 55 Q 460 50 455 40" fill="none" stroke="#FF1493" stroke-width="1" opacity="0.5"/>
  <path d="M 450 58 Q 465 50 460 35" fill="none" stroke="#FF1493" stroke-width="1" opacity="0.3"/>
  <path d="M 432 55 Q 420 50 425 40" fill="none" stroke="#FF1493" stroke-width="1" opacity="0.5"/>
  <path d="M 430 58 Q 415 50 420 35" fill="none" stroke="#FF1493" stroke-width="1" opacity="0.3"/>
  <!-- Exhaust glow -->
  <circle cx="520" cy="250" r="15" fill="#FF1493" opacity="0.1"/>
  <circle cx="520" cy="250" r="8" fill="#FF1493" opacity="0.15"/>
  <!-- Title text -->
  <text x="320" y="370" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#FFD700" letter-spacing="4">THE NEON STABLE</text>
  <text x="320" y="370" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#FFD700" letter-spacing="4" opacity="0.3" filter="blur(4px)">THE NEON STABLE</text>
</svg>