<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0010"/>
      <stop offset="100%" stop-color="#1A0033"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A0030"/>
      <stop offset="100%" stop-color="#0D0018"/>
    </linearGradient>
    <radialGradient id="screen-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#39FF14" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#39FF14" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="640" height="400" fill="url(#bg)"/>
  <!-- Underground room walls -->
  <rect x="40" y="60" width="560" height="280" fill="url(#wall)" stroke="#BF00FF" stroke-width="1"/>
  <!-- Ceiling pipes -->
  <line x1="40" y1="75" x2="600" y2="75" stroke="#2A1045" stroke-width="6"/>
  <line x1="40" y1="85" x2="600" y2="85" stroke="#1A0030" stroke-width="3"/>
  <circle cx="150" cy="75" r="4" fill="#1A0030" stroke="#BF00FF" stroke-width="0.5"/>
  <circle cx="350" cy="75" r="4" fill="#1A0030" stroke="#BF00FF" stroke-width="0.5"/>
  <circle cx="500" cy="75" r="4" fill="#1A0030" stroke="#BF00FF" stroke-width="0.5"/>
  <!-- Floor -->
  <rect x="40" y="300" width="560" height="40" fill="#0D0018"/>
  <line x1="40" y1="300" x2="600" y2="300" stroke="#BF00FF" stroke-width="0.5" opacity="0.4"/>
  <!-- Main console/desk -->
  <rect x="120" y="220" width="400" height="80" fill="#150025" stroke="#BF00FF" stroke-width="1"/>
  <rect x="130" y="210" width="380" height="15" fill="#1A0030" stroke="#BF00FF" stroke-width="0.5"/>
  <!-- Monitor screens -->
  <rect x="150" y="130" width="100" height="70" fill="#0A0010" stroke="#39FF14" stroke-width="1.5"/>
  <rect x="150" y="130" width="100" height="70" fill="url(#screen-glow)"/>
  <!-- Waveform on screen -->
  <polyline points="160,165 170,155 180,170 190,150 200,168 210,152 220,170 230,158 240,165" fill="none" stroke="#39FF14" stroke-width="1.5"/>
  <!-- Second monitor -->
  <rect x="270" y="140" width="90" height="60" fill="#0A0010" stroke="#00FFFF" stroke-width="1.5"/>
  <!-- Text on second screen -->
  <line x1="280" y1="155" x2="340" y2="155" stroke="#00FFFF" stroke-width="0.5" opacity="0.6"/>
  <line x1="280" y1="163" x2="330" y2="163" stroke="#00FFFF" stroke-width="0.5" opacity="0.4"/>
  <line x1="280" y1="171" x2="345" y2="171" stroke="#00FFFF" stroke-width="0.5" opacity="0.5"/>
  <line x1="280" y1="179" x2="320" y2="179" stroke="#00FFFF" stroke-width="0.5" opacity="0.3"/>
  <line x1="280" y1="187" x2="340" y2="187" stroke="#00FFFF" stroke-width="0.5" opacity="0.5"/>
  <!-- Third smaller monitor -->
  <rect x="380" y="145" width="70" height="50" fill="#0A0010" stroke="#FF1493" stroke-width="1"/>
  <!-- Bars on third screen (EQ visualizer) -->
  <rect x="390" y="175" width="6" height="15" fill="#FF1493" opacity="0.7" transform="rotate(180 393 182)"/>
  <rect x="400" y="170" width="6" height="20" fill="#FF1493" opacity="0.8" transform="rotate(180 403 180)"/>
  <rect x="410" y="168" width="6" height="22" fill="#FF1493" opacity="0.6" transform="rotate(180 413 179)"/>
  <rect x="420" y="172" width="6" height="18" fill="#FF1493" opacity="0.7" transform="rotate(180 423 181)"/>
  <rect x="430" y="176" width="6" height="14" fill="#FF1493" opacity="0.5" transform="rotate(180 433 183)"/>
  <!-- Knobs and buttons on console -->
  <circle cx="160" cy="250" r="8" fill="#0A0010" stroke="#FFD700" stroke-width="1"/>
  <circle cx="160" cy="250" r="3" fill="#FFD700" opacity="0.5"/>
  <circle cx="200" cy="250" r="8" fill="#0A0010" stroke="#FF1493" stroke-width="1"/>
  <circle cx="200" cy="250" r="3" fill="#FF1493" opacity="0.5"/>
  <circle cx="240" cy="250" r="8" fill="#0A0010" stroke="#00FFFF" stroke-width="1"/>
  <circle cx="240" cy="250" r="3" fill="#00FFFF" opacity="0.5"/>
  <!-- Slider controls -->
  <rect x="300" y="235" width="4" height="40" fill="#1A0030" stroke="#BF00FF" stroke-width="0.5"/>
  <rect x="297" y="248" width="10" height="6" fill="#39FF14" opacity="0.7"/>
  <rect x="320" y="235" width="4" height="40" fill="#1A0030" stroke="#BF00FF" stroke-width="0.5"/>
  <rect x="317" y="255" width="10" height="6" fill="#39FF14" opacity="0.7"/>
  <rect x="340" y="235" width="4" height="40" fill="#1A0030" stroke="#BF00FF" stroke-width="0.5"/>
  <rect x="337" y="242" width="10" height="6" fill="#39FF14" opacity="0.7"/>
  <rect x="360" y="235" width="4" height="40" fill="#1A0030" stroke="#BF00FF" stroke-width="0.5"/>
  <rect x="357" y="260" width="10" height="6" fill="#39FF14" opacity="0.7"/>
  <!-- Microphone -->
  <line x1="480" y1="200" x2="480" y2="240" stroke="#888" stroke-width="2"/>
  <rect x="472" y="240" width="16" height="5" fill="#888"/>
  <ellipse cx="480" cy="195" rx="10" ry="14" fill="#1A0030" stroke="#FFD700" stroke-width="1"/>
  <line x1="472" y1="190" x2="472" y2="200" stroke="#FFD700" stroke-width="0.5" opacity="0.5"/>
  <line x1="476" y1="188" x2="476" y2="202" stroke="#FFD700" stroke-width="0.5" opacity="0.5"/>
  <line x1="484" y1="188" x2="484" y2="202" stroke="#FFD700" stroke-width="0.5" opacity="0.5"/>
  <line x1="488" y1="190" x2="488" y2="200" stroke="#FFD700" stroke-width="0.5" opacity="0.5"/>
  <!-- Cables on floor -->
  <path d="M 130 300 Q 140 315 180 310 Q 220 305 250 320" fill="none" stroke="#BF00FF" stroke-width="2" opacity="0.4"/>
  <path d="M 400 300 Q 420 318 460 312 Q 500 306 550 325" fill="none" stroke="#FF1493" stroke-width="2" opacity="0.3"/>
  <!-- ON AIR light -->
  <rect x="260" y="95" width="120" height="28" rx="4" fill="#0A0010" stroke="#FF1493" stroke-width="2"/>
  <text x="320" y="114" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" font-weight="bold" fill="#FF1493">ON AIR</text>
  <rect x="260" y="95" width="120" height="28" rx="4" fill="#FF1493" opacity="0.08"/>
  <!-- Antenna symbol on wall -->
  <line x1="550" y1="120" x2="550" y2="180" stroke="#888" stroke-width="1.5"/>
  <path d="M 540 130 Q 530 120 540 110" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.5"/>
  <path d="M 560 130 Q 570 120 560 110" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.5"/>
  <path d="M 535 135 Q 520 120 535 105" fill="none" stroke="#00FFFF" stroke-width="0.8" opacity="0.3"/>
  <path d="M 565 135 Q 580 120 565 105" fill="none" stroke="#00FFFF" stroke-width="0.8" opacity="0.3"/>
  <!-- Title text -->
  <text x="320" y="370" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#39FF14" letter-spacing="4">PIRATE RADIO</text>
  <text x="320" y="370" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#39FF14" letter-spacing="4" opacity="0.3" filter="blur(4px)">PIRATE RADIO</text>
</svg>