<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A0033"/>
      <stop offset="40%" stop-color="#2A0045"/>
      <stop offset="100%" stop-color="#0A0010"/>
    </linearGradient>
    <linearGradient id="waste-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A0040"/>
      <stop offset="100%" stop-color="#150020"/>
    </linearGradient>
    <linearGradient id="haze" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF1493" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#BF00FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF1493" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="640" height="400" fill="url(#bg)"/>
  <!-- Dim purple haze layer -->
  <rect x="0" y="100" width="640" height="200" fill="url(#haze)"/>
  <!-- Barren horizon line -->
  <path d="M 0 250 Q 80 245 160 248 Q 240 252 320 247 Q 400 243 480 249 Q 560 253 640 248" fill="url(#waste-ground)" stroke="#BF00FF" stroke-width="0.5" opacity="0.4"/>
  <rect x="0" y="250" width="640" height="150" fill="url(#waste-ground)"/>
  <!-- Distant dead mountains/ridges -->
  <path d="M 0 250 L 60 200 L 120 230 L 200 190 L 260 220 L 300 250" fill="#1A0030" opacity="0.5"/>
  <path d="M 340 250 L 400 210 L 450 230 L 520 195 L 580 220 L 640 240 L 640 250" fill="#1A0030" opacity="0.5"/>
  <!-- Cracked ground lines -->
  <path d="M 100 260 L 130 280 L 110 310" fill="none" stroke="#BF00FF" stroke-width="0.5" opacity="0.2"/>
  <path d="M 300 255 L 340 275 L 320 300 L 350 330" fill="none" stroke="#FF1493" stroke-width="0.5" opacity="0.2"/>
  <path d="M 500 260 L 530 290 L 510 320" fill="none" stroke="#BF00FF" stroke-width="0.5" opacity="0.2"/>
  <path d="M 200 270 L 220 295" fill="none" stroke="#FF1493" stroke-width="0.3" opacity="0.15"/>
  <path d="M 420 265 L 440 285 L 425 310" fill="none" stroke="#BF00FF" stroke-width="0.3" opacity="0.15"/>
  <!-- Dead tree stumps/poles -->
  <line x1="120" y1="248" x2="115" y2="210" stroke="#3A1050" stroke-width="3"/>
  <line x1="115" y1="220" x2="105" y2="210" stroke="#3A1050" stroke-width="1.5"/>
  <line x1="450" y1="249" x2="455" y2="215" stroke="#3A1050" stroke-width="3"/>
  <line x1="455" y1="230" x2="465" y2="222" stroke="#3A1050" stroke-width="1.5"/>
  <!-- Scattered ruins/debris -->
  <rect x="250" y="255" width="20" height="12" fill="#1A0028" stroke="#BF00FF" stroke-width="0.3" opacity="0.4" transform="rotate(5 260 261)"/>
  <rect x="530" y="258" width="15" height="8" fill="#1A0028" stroke="#FF1493" stroke-width="0.3" opacity="0.3" transform="rotate(-8 537 262)"/>
  <polygon points="180,252 186,240 192,252" fill="#1A0028" stroke="#BF00FF" stroke-width="0.3" opacity="0.3"/>
  <!-- Faint pastel glow on horizon -->
  <ellipse cx="320" cy="247" rx="300" ry="30" fill="#FF1493" opacity="0.04"/>
  <ellipse cx="320" cy="247" rx="200" ry="20" fill="#BF00FF" opacity="0.05"/>
  <!-- Dim stars -->
  <circle cx="80" cy="60" r="1" fill="#FF1493" opacity="0.4"/>
  <circle cx="200" cy="40" r="1.5" fill="#BF00FF" opacity="0.3"/>
  <circle cx="350" cy="50" r="1" fill="#00FFFF" opacity="0.3"/>
  <circle cx="480" cy="35" r="1.5" fill="#FF1493" opacity="0.4"/>
  <circle cx="560" cy="55" r="1" fill="#BF00FF" opacity="0.3"/>
  <circle cx="150" cy="80" r="1" fill="#FFD700" opacity="0.2"/>
  <circle cx="420" cy="70" r="1" fill="#00FFFF" opacity="0.2"/>
  <!-- Faded pink moon -->
  <circle cx="500" cy="100" r="30" fill="#FF1493" opacity="0.08"/>
  <circle cx="500" cy="100" r="25" fill="#FF1493" opacity="0.06"/>
  <circle cx="508" cy="95" r="25" fill="#0A0010" opacity="0.5"/>
  <!-- Title text -->
  <text x="320" y="370" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#BF00FF" letter-spacing="4">PASTEL WASTES</text>
  <text x="320" y="370" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#BF00FF" letter-spacing="4" opacity="0.3" filter="blur(4px)">PASTEL WASTES</text>
</svg>