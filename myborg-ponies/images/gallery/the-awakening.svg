<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0010"/>
      <stop offset="100%" stop-color="#1A0033"/>
    </linearGradient>
    <radialGradient id="eye-light" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#BF00FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0A0010" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ray1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#BF00FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#BF00FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="640" height="400" fill="url(#bg)"/>
  <!-- Central light source glow -->
  <circle cx="320" cy="170" r="150" fill="url(#eye-light)"/>
  <circle cx="320" cy="170" r="80" fill="#00FFFF" opacity="0.04"/>
  <!-- Light rays radiating outward -->
  <line x1="320" y1="170" x2="50" y2="30" stroke="#00FFFF" stroke-width="1.5" opacity="0.15"/>
  <line x1="320" y1="170" x2="150" y2="10" stroke="#BF00FF" stroke-width="1" opacity="0.12"/>
  <line x1="320" y1="170" x2="590" y2="20" stroke="#00FFFF" stroke-width="1.5" opacity="0.15"/>
  <line x1="320" y1="170" x2="490" y2="15" stroke="#BF00FF" stroke-width="1" opacity="0.12"/>
  <line x1="320" y1="170" x2="640" y2="100" stroke="#00FFFF" stroke-width="1" opacity="0.1"/>
  <line x1="320" y1="170" x2="0" y2="110" stroke="#00FFFF" stroke-width="1" opacity="0.1"/>
  <line x1="320" y1="170" x2="100" y2="60" stroke="#39FF14" stroke-width="0.8" opacity="0.08"/>
  <line x1="320" y1="170" x2="540" y2="50" stroke="#39FF14" stroke-width="0.8" opacity="0.08"/>
  <line x1="320" y1="170" x2="640" y2="170" stroke="#FFD700" stroke-width="0.8" opacity="0.08"/>
  <line x1="320" y1="170" x2="0" y2="170" stroke="#FFD700" stroke-width="0.8" opacity="0.08"/>
  <line x1="320" y1="170" x2="640" y2="50" stroke="#FF1493" stroke-width="0.5" opacity="0.06"/>
  <line x1="320" y1="170" x2="0" y2="50" stroke="#FF1493" stroke-width="0.5" opacity="0.06"/>
  <!-- Ground/floor -->
  <rect x="0" y="310" width="640" height="90" fill="#0A0010" opacity="0.9"/>
  <line x1="0" y1="310" x2="640" y2="310" stroke="#BF00FF" stroke-width="0.5" opacity="0.3"/>
  <!-- Pony silhouette - centered, single figure -->
  <!-- Body -->
  <ellipse cx="320" cy="250" rx="55" ry="35" fill="#0A0010" stroke="#00FFFF" stroke-width="1.5"/>
  <!-- Head - tilted up slightly -->
  <ellipse cx="365" cy="195" rx="25" ry="22" fill="#0A0010" stroke="#00FFFF" stroke-width="1.5"/>
  <!-- Neck -->
  <path d="M 350 225 Q 360 210 365 212" fill="#0A0010" stroke="#00FFFF" stroke-width="1.5"/>
  <path d="M 340 230 Q 350 215 358 218" fill="#0A0010" stroke="#00FFFF" stroke-width="1.5"/>
  <!-- Horn -->
  <line x1="375" y1="178" x2="395" y2="148" stroke="#00FFFF" stroke-width="2"/>
  <circle cx="395" cy="146" r="4" fill="#00FFFF" opacity="0.7"/>
  <circle cx="395" cy="146" r="10" fill="#00FFFF" opacity="0.15"/>
  <!-- Ear -->
  <polygon points="358,180 350,162 370,175" fill="#0A0010" stroke="#00FFFF" stroke-width="1"/>
  <!-- Opening eye - THE key detail -->
  <ellipse cx="375" cy="192" rx="8" ry="5" fill="#0A0010" stroke="#00FFFF" stroke-width="1.5"/>
  <ellipse cx="375" cy="192" rx="5" ry="4" fill="#00FFFF" opacity="0.7"/>
  <circle cx="375" cy="192" r="2" fill="white" opacity="0.8"/>
  <!-- Eye glow effect -->
  <circle cx="375" cy="192" r="12" fill="#00FFFF" opacity="0.1"/>
  <circle cx="375" cy="192" r="20" fill="#00FFFF" opacity="0.05"/>
  <!-- Light beam from eye -->
  <path d="M 383 190 L 430 170 L 425 195 Z" fill="#00FFFF" opacity="0.05"/>
  <!-- Mane -->
  <path d="M 350 180 Q 335 170 340 190 Q 330 180 335 198" fill="none" stroke="#BF00FF" stroke-width="1.5" opacity="0.5"/>
  <path d="M 335 198 Q 325 190 328 208" fill="none" stroke="#BF00FF" stroke-width="1" opacity="0.4"/>
  <!-- Front legs -->
  <line x1="305" y1="280" x2="300" y2="310" stroke="#00FFFF" stroke-width="3"/>
  <line x1="330" y1="280" x2="325" y2="310" stroke="#00FFFF" stroke-width="3"/>
  <!-- Back legs -->
  <line x1="275" y1="275" x2="265" y2="310" stroke="#00FFFF" stroke-width="3"/>
  <line x1="295" y1="278" x2="285" y2="310" stroke="#00FFFF" stroke-width="3"/>
  <!-- Tail -->
  <path d="M 265 250 Q 235 245 225 260 Q 215 275 230 270" fill="none" stroke="#BF00FF" stroke-width="2" opacity="0.5"/>
  <!-- Circuit lines appearing on body - awakening -->
  <line x1="290" y1="240" x2="310" y2="240" stroke="#00FFFF" stroke-width="0.5" opacity="0.4"/>
  <line x1="300" y1="240" x2="300" y2="255" stroke="#00FFFF" stroke-width="0.5" opacity="0.4"/>
  <circle cx="300" cy="240" r="2" fill="#00FFFF" opacity="0.4"/>
  <line x1="330" y1="245" x2="350" y2="245" stroke="#00FFFF" stroke-width="0.5" opacity="0.3"/>
  <circle cx="350" cy="245" r="1.5" fill="#00FFFF" opacity="0.3"/>
  <!-- Small particles rising from the pony -->
  <circle cx="330" cy="180" r="2" fill="#00FFFF" opacity="0.4"/>
  <circle cx="310" cy="190" r="1.5" fill="#BF00FF" opacity="0.3"/>
  <circle cx="350" cy="175" r="1" fill="#FFD700" opacity="0.3"/>
  <circle cx="295" cy="200" r="1.5" fill="#39FF14" opacity="0.25"/>
  <circle cx="370" cy="165" r="1" fill="#FF1493" opacity="0.3"/>
  <circle cx="340" cy="170" r="1.5" fill="#00FFFF" opacity="0.35"/>
  <!-- Title text -->
  <text x="320" y="370" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#00FFFF" letter-spacing="4">THE AWAKENING</text>
  <text x="320" y="370" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#00FFFF" letter-spacing="4" opacity="0.3" filter="blur(4px)">THE AWAKENING</text>
</svg>