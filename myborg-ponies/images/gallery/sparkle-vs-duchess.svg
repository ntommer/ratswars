<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0010"/>
      <stop offset="100%" stop-color="#1A0033"/>
    </linearGradient>
    <linearGradient id="left-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="right-glow" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#FF1493" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF1493" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="clash-energy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#BF00FF"/>
      <stop offset="100%" stop-color="#FF1493"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="640" height="400" fill="url(#bg)"/>
  <!-- Left side glow (Sparkle - cyan) -->
  <rect x="0" y="0" width="320" height="400" fill="url(#left-glow)"/>
  <!-- Right side glow (Duchess - pink) -->
  <rect x="320" y="0" width="320" height="400" fill="url(#right-glow)"/>
  <!-- Center dividing energy line -->
  <line x1="320" y1="0" x2="320" y2="400" stroke="#BF00FF" stroke-width="2" opacity="0.3"/>
  <!-- Left silhouette - Sparkle (pony shape facing right) -->
  <!-- Body -->
  <ellipse cx="180" cy="220" rx="70" ry="45" fill="#0A0010" stroke="#00FFFF" stroke-width="1.5"/>
  <!-- Head -->
  <ellipse cx="240" cy="170" rx="30" ry="25" fill="#0A0010" stroke="#00FFFF" stroke-width="1.5"/>
  <!-- Neck connecting body to head -->
  <path d="M 220 195 Q 230 180 240 185" fill="#0A0010" stroke="#00FFFF" stroke-width="1.5"/>
  <path d="M 230 200 Q 240 195 245 195" fill="#0A0010" stroke="#00FFFF" stroke-width="1.5"/>
  <!-- Horn -->
  <line x1="250" y1="155" x2="270" y2="125" stroke="#00FFFF" stroke-width="2"/>
  <circle cx="270" cy="123" r="3" fill="#00FFFF" opacity="0.6"/>
  <!-- Ear -->
  <polygon points="235,155 228,138 245,148" fill="#0A0010" stroke="#00FFFF" stroke-width="1"/>
  <!-- Eye glow -->
  <circle cx="250" cy="168" r="4" fill="#00FFFF" opacity="0.6"/>
  <circle cx="250" cy="168" r="2" fill="white" opacity="0.4"/>
  <!-- Mane suggestion -->
  <path d="M 225 150 Q 210 140 215 158 Q 205 148 210 165" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.5"/>
  <!-- Front legs -->
  <line x1="160" y1="260" x2="155" y2="310" stroke="#00FFFF" stroke-width="3"/>
  <line x1="190" y1="260" x2="185" y2="310" stroke="#00FFFF" stroke-width="3"/>
  <!-- Back legs -->
  <line x1="130" y1="255" x2="120" y2="310" stroke="#00FFFF" stroke-width="3"/>
  <line x1="150" y1="258" x2="140" y2="310" stroke="#00FFFF" stroke-width="3"/>
  <!-- Tail -->
  <path d="M 110 220 Q 80 210 70 230 Q 60 250 80 245" fill="none" stroke="#00FFFF" stroke-width="2" opacity="0.6"/>
  <!-- Circuit pattern on body -->
  <line x1="160" y1="210" x2="200" y2="210" stroke="#00FFFF" stroke-width="0.5" opacity="0.3"/>
  <line x1="180" y1="210" x2="180" y2="230" stroke="#00FFFF" stroke-width="0.5" opacity="0.3"/>
  <circle cx="180" cy="210" r="2" fill="#00FFFF" opacity="0.3"/>
  <!-- Right silhouette - Duchess (pony shape facing left) -->
  <!-- Body -->
  <ellipse cx="460" cy="220" rx="70" ry="45" fill="#0A0010" stroke="#FF1493" stroke-width="1.5"/>
  <!-- Head -->
  <ellipse cx="400" cy="170" rx="30" ry="25" fill="#0A0010" stroke="#FF1493" stroke-width="1.5"/>
  <!-- Neck -->
  <path d="M 420 195 Q 410 180 400 185" fill="#0A0010" stroke="#FF1493" stroke-width="1.5"/>
  <path d="M 410 200 Q 400 195 395 195" fill="#0A0010" stroke="#FF1493" stroke-width="1.5"/>
  <!-- Horn/crown -->
  <path d="M 385 150 L 390 130 L 395 145 L 400 128 L 405 145 L 410 132 L 415 150" fill="none" stroke="#FFD700" stroke-width="1.5"/>
  <!-- Ear -->
  <polygon points="405,155 412,138 395,148" fill="#0A0010" stroke="#FF1493" stroke-width="1"/>
  <!-- Eye glow -->
  <circle cx="390" cy="168" r="4" fill="#FF1493" opacity="0.6"/>
  <circle cx="390" cy="168" r="2" fill="white" opacity="0.4"/>
  <!-- Mane -->
  <path d="M 415 150 Q 430 140 425 158 Q 435 148 430 165" fill="none" stroke="#FF1493" stroke-width="1" opacity="0.5"/>
  <!-- Front legs -->
  <line x1="480" y1="260" x2="485" y2="310" stroke="#FF1493" stroke-width="3"/>
  <line x1="450" y1="260" x2="455" y2="310" stroke="#FF1493" stroke-width="3"/>
  <!-- Back legs -->
  <line x1="510" y1="255" x2="520" y2="310" stroke="#FF1493" stroke-width="3"/>
  <line x1="490" y1="258" x2="500" y2="310" stroke="#FF1493" stroke-width="3"/>
  <!-- Tail -->
  <path d="M 530 220 Q 560 210 570 230 Q 580 250 560 245" fill="none" stroke="#FF1493" stroke-width="2" opacity="0.6"/>
  <!-- Circuit pattern on body -->
  <line x1="440" y1="210" x2="480" y2="210" stroke="#FF1493" stroke-width="0.5" opacity="0.3"/>
  <line x1="460" y1="210" x2="460" y2="230" stroke="#FF1493" stroke-width="0.5" opacity="0.3"/>
  <circle cx="460" cy="210" r="2" fill="#FF1493" opacity="0.3"/>
  <!-- Center clash energy -->
  <path d="M 290 130 L 310 170 L 295 170 L 320 200 L 300 200 L 325 240" fill="none" stroke="url(#clash-energy)" stroke-width="2" opacity="0.7"/>
  <path d="M 350 130 L 330 170 L 345 170 L 320 200 L 340 200 L 315 240" fill="none" stroke="url(#clash-energy)" stroke-width="2" opacity="0.7"/>
  <!-- Spark effects at center -->
  <circle cx="320" cy="200" r="15" fill="#FFD700" opacity="0.1"/>
  <circle cx="320" cy="200" r="8" fill="#BF00FF" opacity="0.15"/>
  <circle cx="320" cy="200" r="3" fill="white" opacity="0.2"/>
  <!-- VS text at center -->
  <text x="320" y="208" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" font-weight="bold" fill="#FFD700" opacity="0.8">VS</text>
  <!-- Ground -->
  <line x1="0" y1="315" x2="640" y2="315" stroke="#BF00FF" stroke-width="0.5" opacity="0.3"/>
  <!-- Name labels -->
  <text x="180" y="340" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#00FFFF" opacity="0.7">SPARKLE</text>
  <text x="460" y="340" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#FF1493" opacity="0.7">DUCHESS</text>
  <!-- Title text -->
  <text x="320" y="378" text-anchor="middle" font-family="'Courier New', monospace" font-size="24" font-weight="bold" fill="#BF00FF" letter-spacing="3">SPARKLE VS DUCHESS</text>
  <text x="320" y="378" text-anchor="middle" font-family="'Courier New', monospace" font-size="24" font-weight="bold" fill="#BF00FF" letter-spacing="3" opacity="0.3" filter="blur(4px)">SPARKLE VS DUCHESS</text>
</svg>