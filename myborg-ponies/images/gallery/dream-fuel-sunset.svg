<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="rainbow-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0010"/>
      <stop offset="20%" stop-color="#1A0033"/>
      <stop offset="40%" stop-color="#BF00FF"/>
      <stop offset="55%" stop-color="#FF1493"/>
      <stop offset="70%" stop-color="#FFD700"/>
      <stop offset="85%" stop-color="#FF1493"/>
      <stop offset="100%" stop-color="#1A0033"/>
    </linearGradient>
    <linearGradient id="refinery-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A0045"/>
      <stop offset="100%" stop-color="#0D0018"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#FF1493" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#BF00FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Rainbow sky background -->
  <rect width="640" height="400" fill="url(#rainbow-sky)"/>
  <!-- Setting sun -->
  <circle cx="320" cy="200" r="60" fill="url(#sun)"/>
  <circle cx="320" cy="200" r="35" fill="#FFD700" opacity="0.3"/>
  <circle cx="320" cy="200" r="20" fill="#FFD700" opacity="0.4"/>
  <!-- Sun rays -->
  <line x1="320" y1="130" x2="320" y2="110" stroke="#FFD700" stroke-width="1" opacity="0.3"/>
  <line x1="370" y1="150" x2="385" y2="135" stroke="#FFD700" stroke-width="1" opacity="0.3"/>
  <line x1="270" y1="150" x2="255" y2="135" stroke="#FFD700" stroke-width="1" opacity="0.3"/>
  <line x1="385" y1="200" x2="400" y2="200" stroke="#FFD700" stroke-width="1" opacity="0.2"/>
  <line x1="255" y1="200" x2="240" y2="200" stroke="#FFD700" stroke-width="1" opacity="0.2"/>
  <!-- Horizon line -->
  <rect x="0" y="230" width="640" height="170" fill="#0A0010" opacity="0.85"/>
  <line x1="0" y1="230" x2="640" y2="230" stroke="#FF1493" stroke-width="1" opacity="0.4"/>
  <!-- Refinery silhouette -->
  <!-- Main building -->
  <rect x="180" y="170" width="120" height="60" fill="#0D0018" stroke="#BF00FF" stroke-width="0.5" opacity="0.8"/>
  <rect x="340" y="180" width="100" height="50" fill="#0D0018" stroke="#BF00FF" stroke-width="0.5" opacity="0.8"/>
  <!-- Tall chimneys/towers -->
  <rect x="195" y="100" width="18" height="70" fill="#0D0018"/>
  <rect x="230" y="110" width="15" height="60" fill="#0D0018"/>
  <rect x="265" y="90" width="20" height="80" fill="#0D0018"/>
  <rect x="355" y="120" width="16" height="60" fill="#0D0018"/>
  <rect x="400" y="105" width="18" height="75" fill="#0D0018"/>
  <!-- Chimney tops with flame -->
  <ellipse cx="204" cy="96" rx="5" ry="8" fill="#FFD700" opacity="0.4"/>
  <ellipse cx="204" cy="92" rx="3" ry="5" fill="#FF1493" opacity="0.3"/>
  <ellipse cx="275" cy="86" rx="5" ry="8" fill="#FFD700" opacity="0.4"/>
  <ellipse cx="275" cy="82" rx="3" ry="5" fill="#FF1493" opacity="0.3"/>
  <ellipse cx="409" cy="101" rx="5" ry="8" fill="#FFD700" opacity="0.4"/>
  <ellipse cx="409" cy="97" rx="3" ry="5" fill="#FF1493" opacity="0.3"/>
  <!-- Connecting pipes between structures -->
  <line x1="300" y1="195" x2="340" y2="195" stroke="#1A0030" stroke-width="4"/>
  <line x1="300" y1="205" x2="340" y2="205" stroke="#1A0030" stroke-width="3"/>
  <!-- Tank/sphere -->
  <circle cx="490" cy="210" r="25" fill="#0D0018" stroke="#BF00FF" stroke-width="0.5" opacity="0.7"/>
  <line x1="480" y1="230" x2="480" y2="250" stroke="#0D0018" stroke-width="3"/>
  <line x1="500" y1="230" x2="500" y2="250" stroke="#0D0018" stroke-width="3"/>
  <!-- Smaller structures -->
  <rect x="100" y="200" width="60" height="30" fill="#0D0018" opacity="0.7"/>
  <rect x="530" y="210" width="50" height="20" fill="#0D0018" opacity="0.7"/>
  <!-- Reflection on water/ground -->
  <rect x="0" y="232" width="640" height="5" fill="#FFD700" opacity="0.06"/>
  <rect x="0" y="238" width="640" height="3" fill="#FF1493" opacity="0.05"/>
  <line x1="280" y1="240" x2="360" y2="240" stroke="#FFD700" stroke-width="1" opacity="0.15"/>
  <line x1="290" y1="250" x2="350" y2="250" stroke="#FFD700" stroke-width="0.5" opacity="0.1"/>
  <line x1="300" y1="260" x2="340" y2="260" stroke="#FFD700" stroke-width="0.5" opacity="0.05"/>
  <!-- Rainbow color bands in sky -->
  <rect x="0" y="140" width="640" height="2" fill="#00FFFF" opacity="0.08"/>
  <rect x="0" y="155" width="640" height="2" fill="#39FF14" opacity="0.06"/>
  <rect x="0" y="170" width="640" height="2" fill="#FFD700" opacity="0.08"/>
  <!-- Title text -->
  <text x="320" y="370" text-anchor="middle" font-family="'Courier New', monospace" font-size="24" font-weight="bold" fill="#FFD700" letter-spacing="3">DREAM FUEL SUNSET</text>
  <text x="320" y="370" text-anchor="middle" font-family="'Courier New', monospace" font-size="24" font-weight="bold" fill="#FFD700" letter-spacing="3" opacity="0.3" filter="blur(4px)">DREAM FUEL SUNSET</text>
</svg>