<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A0033"/>
      <stop offset="100%" stop-color="#0A0010"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- T-shirt silhouette -->
  <path d="M 120 100 L 80 130 L 100 140 L 100 300 L 300 300 L 300 140 L 320 130 L 280 100 L 260 115 Q 230 130 200 130 Q 170 130 140 115 Z" fill="#0A0010" stroke="#BF00FF" stroke-width="2"/>
  <!-- Neckline -->
  <path d="M 140 115 Q 170 130 200 130 Q 230 130 260 115" fill="none" stroke="#BF00FF" stroke-width="1.5"/>
  <!-- Design on shirt - Voltage/lightning bolt -->
  <path d="M 190 155 L 180 190 L 200 190 L 170 235" fill="none" stroke="#BF00FF" stroke-width="3" opacity="0.7"/>
  <path d="M 210 155 L 220 190 L 200 190 L 230 235" fill="none" stroke="#BF00FF" stroke-width="3" opacity="0.7"/>
  <!-- Electric sparks -->
  <circle cx="170" cy="235" r="4" fill="#BF00FF" opacity="0.3"/>
  <circle cx="230" cy="235" r="4" fill="#BF00FF" opacity="0.3"/>
  <circle cx="200" cy="190" r="5" fill="#BF00FF" opacity="0.2"/>
  <!-- Voltage text on shirt -->
  <text x="200" y="270" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#BF00FF" opacity="0.5">VOLTAGE</text>
  <!-- Title text -->
  <text x="200" y="360" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" font-weight="bold" fill="#BF00FF" letter-spacing="2">VIOLET VOLTAGE TEE</text>
  <text x="200" y="360" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" font-weight="bold" fill="#BF00FF" letter-spacing="2" opacity="0.3" filter="blur(3px)">VIOLET VOLTAGE TEE</text>
</svg>